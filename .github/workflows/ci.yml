name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check Ruff formatting
        run: uv run ruff format --check .

  unit-tests:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: test-key

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run unit tests
        run: uv run pytest tests --ignore=tests/e2e

  e2e-tests:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: test-key

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run e2e tests
        run: uv run pytest tests/e2e -o addopts=''
